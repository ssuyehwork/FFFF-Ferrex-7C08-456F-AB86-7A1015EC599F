<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFB347;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
        </linearGradient>
    </defs>
    <!-- 外框六边形 -->
    <path d="M50 5 L90 27.5 L90 72.5 L50 95 L10 72.5 L10 27.5 Z" fill="url(#grad)" />
    <!-- 内部切面纹理，增强高清质感 -->
    <path d="M50 5 L90 27.5 L50 50 Z" fill="rgba(255,255,255,0.2)" />
    <path d="M10 27.5 L50 50 L10 72.5 Z" fill="rgba(0,0,0,0.1)" />
    <!-- 核心镂空部分 -->
    <circle cx="50" cy="50" r="15" fill="#07090b" />
    <path d="M50 35 L65 50 L50 65 L35 50 Z" fill="#FF8C00" />
</svg>
